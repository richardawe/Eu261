name: Claim receiver — create issue from form dispatch

on:
  workflow_dispatch:
    inputs:
      title:
        description: "Issue title"
        required: true
      body:
        description: "Issue body (markdown)"
        required: true

jobs:
  create-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Validate payload
        env:
          TITLE: ${{ inputs.title }}
          BODY: ${{ inputs.body }}
        run: |
          [ -n "$TITLE" ] && [ -n "$BODY" ] || { echo "::error::Missing title or body"; exit 1; }
          printf '%s' "$TITLE" | grep -qE '^Claim: ' || { echo "::error::Unexpected title format — rejected"; exit 1; }

      - name: Create claim issue
        env:
          # Must use CLAIM_CREATION_TOKEN (not github.token) so the issues:opened
          # event is attributed to the PAT and downstream workflows (intake.yml,
          # eligibility.yml, …) are allowed to trigger.  GITHUB_TOKEN-created
          # events are silenced by GitHub to prevent workflow loops.
          GH_TOKEN: ${{ secrets.CLAIM_CREATION_TOKEN }}
          TITLE: ${{ inputs.title }}
          BODY: ${{ inputs.body }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          printf '%s' "$BODY" > /tmp/claim-body.txt
          gh issue create \
            --title "$TITLE" \
            --body-file /tmp/claim-body.txt \
            --label "claim" \
            --repo "$GITHUB_REPOSITORY"
