name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "ukpolitics/public/data/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; don't cancel in-progress so we don't leave Pages half-deployed.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ukpolitics/package-lock.json

      - name: Install ukpolitics dependencies
        working-directory: ukpolitics
        run: npm ci

      - name: Build ukpolitics static site
        working-directory: ukpolitics
        env:
          GITHUB_PAGES: "true"
          NODE_ENV: production
        run: npm run build

      - name: Assemble combined site artifact
        run: |
          mkdir -p _site
          cp -r site/. _site/
          mkdir -p _site/ukpolitics
          cp -r ukpolitics/out/. _site/ukpolitics/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Inject submission token
        env:
          SUBMISSIONS_TOKEN: ${{ vars.SUBMISSIONS_TOKEN }}
        run: |
          if [ -n "$SUBMISSIONS_TOKEN" ] && [ -f _site/app.js ]; then
            sed -i "s/REPLACE_WITH_FINE_GRAINED_PAT/${SUBMISSIONS_TOKEN}/" _site/app.js
          fi

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
