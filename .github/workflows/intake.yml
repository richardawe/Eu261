name: Intake — encrypt PII and mark intake-complete

on:
  issues:
    types: [labeled]

jobs:
  intake:
    # Only run when the "claim" label is added
    if: github.event.label.name == 'claim'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Encrypt PII in issue body
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          NACL_PUBLIC_KEY: ${{ vars.NACL_PUBLIC_KEY }}
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          python scripts/intake_rewrite.py > /tmp/rewritten_body.md
          gh issue edit "$ISSUE_NUMBER" \
            --body-file /tmp/rewritten_body.md \
            --repo "$GITHUB_REPOSITORY"

      - name: Transition to state:intake-complete
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --add-label "state:intake-complete" \
            --repo "$GITHUB_REPOSITORY"
