name: Eligibility — evaluate claim and post decision

on:
  issues:
    types: [labeled]

jobs:
  eligibility:
    # Only run when intake is complete
    if: github.event.label.name == 'state:intake-complete'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Evaluate eligibility and post decision
        id: eval
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          python scripts/run_eligibility.py
          # Capture resulting state for status update
          NEXT_STATE=$(gh issue view "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --json labels \
            --jq '[.labels[].name | select(startswith("state:"))] | last // "state:error"')
          echo "next_state=$NEXT_STATE" >> "$GITHUB_OUTPUT"

      - name: Write claim status to gh-pages
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          CURRENT_STATE: ${{ steps.eval.outputs.next_state }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: python scripts/write_status.py
