name: UK Politics Matrix — Update & Deploy

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      skip_fetch:
        description: "Skip live news fetch (use existing data)"
        required: false
        default: "false"

# Share the same concurrency group as pages.yml so both queue safely
# and neither half-deploys GitHub Pages.
concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ukpolitics/package-lock.json

      - name: Install ukpolitics dependencies
        working-directory: ukpolitics
        run: npm ci

      # ── Data pipeline ────────────────────────────────────────────────────────

      - name: Seed data if none exists
        if: inputs.skip_fetch != 'true'
        working-directory: ukpolitics
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ ! -f public/data/latest.json ]; then
            echo "No data found — running seed…"
            npm run politics:seed
          fi

      - name: Fetch news & update positions
        if: inputs.skip_fetch != 'true'
        working-directory: ukpolitics
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run politics:update

      # ── Build ukpolitics Next.js static export ───────────────────────────────

      - name: Build ukpolitics static site
        working-directory: ukpolitics
        env:
          GITHUB_PAGES: "true"
          NODE_ENV: production
        run: npm run build

      # ── Assemble combined Pages artifact ─────────────────────────────────────

      - name: Assemble site artifact
        run: |
          mkdir -p _site
          # Main EU261 claims site
          cp -r site/. _site/
          # UK Politics app under /ukpolitics/
          mkdir -p _site/ukpolitics
          cp -r ukpolitics/out/. _site/ukpolitics/

      - name: Inject submission token
        env:
          SUBMISSIONS_TOKEN: ${{ vars.SUBMISSIONS_TOKEN }}
        run: |
          if [ -n "$SUBMISSIONS_TOKEN" ] && [ -f _site/app.js ]; then
            sed -i "s/REPLACE_WITH_FINE_GRAINED_PAT/${SUBMISSIONS_TOKEN}/" _site/app.js
          fi

      # ── Deploy to GitHub Pages ────────────────────────────────────────────────

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # ── Persist updated data files to repo ───────────────────────────────────

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ukpolitics/public/data/
          if ! git diff --staged --quiet; then
            git commit -m "chore(ukpolitics): update matrix data $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
            git push origin HEAD:main || echo "Push skipped (branch protection or no changes)"
          else
            echo "No data changes to commit"
          fi
