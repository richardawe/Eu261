name: UK Politics Matrix — Update & Deploy

on:
  schedule:
    # Run every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      skip_fetch:
        description: "Skip live news fetch (use existing data)"
        required: false
        default: "false"

concurrency:
  group: ukpolitics-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ukpolitics/package-lock.json

      - name: Install dependencies
        working-directory: ukpolitics
        run: npm ci

      # ── Data pipeline ────────────────────────────────────────────────────────
      - name: Fetch news & analyse positions
        if: inputs.skip_fetch != 'true'
        working-directory: ukpolitics
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run politics:update

      - name: Seed data if no data exists
        working-directory: ukpolitics
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ ! -f public/data/latest.json ]; then
            echo "No existing data — running seed…"
            npm run politics:seed
          fi

      # ── Next.js static build ─────────────────────────────────────────────────
      - name: Build static site
        working-directory: ukpolitics
        env:
          GITHUB_PAGES: "true"
          NODE_ENV: production
        run: npm run build

      # ── Merge with existing site/ and deploy ────────────────────────────────
      - name: Prepare combined site artifact
        run: |
          # Include main site
          mkdir -p _site
          cp -r site/. _site/
          # Overlay ukpolitics build
          mkdir -p _site/ukpolitics
          cp -r ukpolitics/out/. _site/ukpolitics/

      - name: Inject submission token (existing site)
        env:
          SUBMISSIONS_TOKEN: ${{ vars.SUBMISSIONS_TOKEN }}
        run: |
          if [ -f _site/app.js ] && [ -n "$SUBMISSIONS_TOKEN" ]; then
            sed -i "s/REPLACE_WITH_FINE_GRAINED_PAT/${SUBMISSIONS_TOKEN}/" _site/app.js
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # ── Commit updated data back to main ─────────────────────────────────────
      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ukpolitics/public/data/
          git diff --staged --quiet || git commit -m "chore(ukpolitics): update political matrix data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin HEAD:main || echo "Push failed (may already be up to date)"
